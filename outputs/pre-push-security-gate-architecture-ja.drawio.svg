<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">Pre-push Security Gate Architecture Japanese</title>
  <desc id="desc">日本語版の pre-push security gate アーキテクチャ図。ローカルの hook、PowerShell レビュー本体、ローカルの Copilot CLI、ログ、リモートリポジトリを示す。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#4a5568" />
    </marker>
    <style>
      .title { font: 700 28px Helvetica, Arial, sans-serif; fill: #1f2937; }
      .subtitle { font: 14px Helvetica, Arial, sans-serif; fill: #475467; }
      .group { fill: #f8fafc; stroke: #667085; stroke-width: 2; rx: 18; ry: 18; }
      .group-title { font: 700 18px Helvetica, Arial, sans-serif; fill: #111827; }
      .node { fill: #dbeafe; stroke: #3b82f6; stroke-width: 2; rx: 14; ry: 14; }
      .node-warn { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 14; ry: 14; }
      .node-external { fill: #ede9fe; stroke: #7c3aed; stroke-width: 2; rx: 14; ry: 14; }
      .node-danger { fill: #fee2e2; stroke: #dc2626; stroke-width: 2; rx: 14; ry: 14; }
      .node-success { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; rx: 14; ry: 14; }
      .text { font: 13px Helvetica, Arial, sans-serif; fill: #0f172a; }
      .text-small { font: 12px Helvetica, Arial, sans-serif; fill: #334155; }
      .arrow { stroke: #4a5568; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <text x="40" y="44" class="title">Pre-push Security Gate</text>
  <text x="40" y="72" class="subtitle">日本語版: 主経路を一直線にし、PASS / FAIL とテスト経路を分離した構成</text>

  <rect x="30" y="100" width="1020" height="650" class="group" />
  <text x="58" y="135" class="group-title">ローカルリポジトリ</text>

  <rect x="1100" y="100" width="300" height="650" class="group" />
  <text x="1128" y="135" class="group-title">リモート</text>

  <rect x="70" y="210" width="120" height="60" class="node-success" />
  <text x="101" y="242" class="text">開発者</text>
  <text x="93" y="262" class="text-small">git push</text>

  <rect x="240" y="195" width="170" height="82" class="node" />
  <text x="272" y="230" class="text">hooks/pre-push</text>
  <text x="293" y="250" class="text-small">ref を受け取る</text>

  <rect x="460" y="190" width="220" height="92" class="node" />
  <text x="474" y="224" class="text">scripts/security_check.ps1</text>
  <text x="508" y="244" class="text-small">PowerShell 7 正本</text>
  <text x="482" y="262" class="text-small">security_check.sh は fallback</text>

  <rect x="740" y="200" width="180" height="72" class="node-external" />
  <text x="772" y="235" class="text">GitHub Copilot CLI</text>
  <text x="788" y="255" class="text-small">ローカルプロセス</text>

  <rect x="970" y="192" width="140" height="88" class="node-warn" />
  <text x="1005" y="228" class="text">判定</text>
  <text x="986" y="248" class="text-small">PASS / FAIL</text>

  <rect x="470" y="380" width="200" height="82" class="node" />
  <text x="505" y="414" class="text">コミット収集</text>
  <text x="493" y="434" class="text-small">git rev-list / git show</text>

  <rect x="720" y="370" width="220" height="98" class="node-warn" />
  <text x="756" y="406" class="text">静的シグナル抽出</text>
  <text x="744" y="426" class="text-small">secret / XSS / SSRF /</text>
  <text x="775" y="444" class="text-small">command exec</text>

  <rect x="190" y="540" width="220" height="90" class="node" />
  <text x="217" y="575" class="text">scripts/test-hook.ps1</text>
  <text x="233" y="595" class="text-small">実 git push の E2E</text>

  <rect x="960" y="540" width="170" height="88" class="node-danger" />
  <text x="1016" y="575" class="text">logs/</text>
  <text x="983" y="595" class="text-small">security-*.log</text>
  <text x="970" y="613" class="text-small">pre-push-invoke-*.log</text>

  <rect x="1165" y="210" width="170" height="70" class="node-success" />
  <text x="1212" y="243" class="text">push 継続</text>
  <text x="1208" y="263" class="text-small">Git が続行</text>

  <rect x="1150" y="400" width="200" height="84" class="node-external" />
  <text x="1187" y="435" class="text">リモートリポジトリ</text>
  <text x="1186" y="455" class="text-small">GitHub / local bare</text>

  <path d="M190 240 L240 240" class="arrow" />
  <path d="M410 236 L460 236" class="arrow" />
  <path d="M680 236 L740 236" class="arrow" />
  <path d="M920 236 L970 236" class="arrow" />
  <path d="M1110 236 L1165 236" class="arrow" />
  <path d="M1250 280 L1250 400" class="arrow" />
  <path d="M570 380 L570 282" class="arrow" />
  <path d="M830 370 L830 282" class="arrow" />
  <path d="M1040 280 L1040 540" class="arrow" />
  <path d="M300 540 L300 270" class="arrow" />

  <text x="200" y="228" class="text-small">hook 起動</text>
  <text x="419" y="224" class="text-small">レビュー実行</text>
  <text x="690" y="224" class="text-small">ローカル prompt</text>
  <text x="930" y="224" class="text-small">判定結果</text>
  <text x="1118" y="224" class="text-small">PASS</text>
  <text x="1260" y="344" class="text-small">remote 更新</text>
  <text x="584" y="336" class="text-small">コミット収集</text>
  <text x="842" y="336" class="text-small">静的シグナル</text>
  <text x="1048" y="398" class="text-small">FAIL → logs / stderr</text>
  <text x="312" y="404" class="text-small">実 push を再現</text>
</svg>